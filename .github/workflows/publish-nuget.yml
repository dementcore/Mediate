name: Publish to NuGet

on:
  release:
    types: [released]

jobs:
  publish:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Get version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "value=${TAG#v}" >> $GITHUB_OUTPUT
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Release --no-restore
      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal
      - name: Pack
        run: |
          dotnet pack src/Mediate/Mediate.csproj --configuration Release --no-build --output ./artifacts /p:PackageVersion=${{ steps.version.outputs.value }} /p:Version=${{ steps.version.outputs.value }}
          dotnet pack src/Mediate.BackgroundEventDispatch/Mediate.BackgroundEventDispatch.csproj --configuration Release --no-build --output ./artifacts /p:PackageVersion=${{ steps.version.outputs.value }} /p:Version=${{ steps.version.outputs.value }}
      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: Push
        run: |
          dotnet nuget push "./artifacts/*.nupkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY  }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push "./artifacts/*.snupkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY  }} --source https://api.nuget.org/v3/index.json --skip-duplicate

